version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: enterprise
    ports:
      - "5432:5432"
  gateway:
    build: ../../apps/gateway
    depends_on:
      - db
    ports:
      - "4000:4000"
  web:
    build: ../../apps/web
    ports:
      - "3000:3000"
